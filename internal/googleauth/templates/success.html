<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected - BabyClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #f4f4f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 440px;
            text-align: center;
            padding: 48px 24px;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            position: relative;
        }

        .icon svg {
            width: 100%;
            height: 100%;
        }

        .badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 24px;
            height: 24px;
            background: #34A853;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 3px #0a0a0f;
        }

        .badge svg {
            width: 14px;
            height: 14px;
            color: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #a1a1aa;
            font-size: 15px;
            margin-bottom: 8px;
        }

        .email {
            color: #4285F4;
            font-weight: 600;
        }

        .services {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin: 16px 0 32px;
        }

        .service {
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 99px;
            border: 1px solid rgba(66, 133, 244, 0.2);
            background: rgba(66, 133, 244, 0.08);
            color: #4285F4;
        }

        .message {
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px 20px;
            color: #a1a1aa;
            font-size: 14px;
            line-height: 1.6;
        }

        .message strong {
            color: #f4f4f5;
        }

        .countdown {
            margin-top: 24px;
            color: #52525b;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <div class="badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
        </div>

        <h1>Google connected!</h1>
        {{if .Email}}
        <p class="subtitle">Authorized as <span class="email">{{.Email}}</span></p>
        {{end}}

        {{if .Services}}
        <div class="services" id="servicesRow"></div>
        {{end}}

        <div class="message">
            You can close this tab and return to <strong>BabyClaw</strong>.
        </div>

        <p class="countdown">Closing in <span id="countdown">{{.CountdownSeconds}}</span>s</p>
    </div>

    <script>
        const connectedServices = [{{range $i, $s := .Services}}{{if $i}},{{end}}"{{$s}}"{{end}}];
        const row = document.getElementById('servicesRow');
        if (row && connectedServices.length > 0) {
            row.innerHTML = connectedServices.map(s =>
                '<span class="service">' + s + '</span>'
            ).join('');
        }

        let seconds = {{.CountdownSeconds}};
        const el = document.getElementById('countdown');
        const iv = setInterval(() => {
            if (--seconds > 0) { el.textContent = seconds; }
            else { clearInterval(iv); el.parentElement.textContent = 'You can close this window.'; }
        }, 1000);
    </script>
</body>
</html>
